{% extends "base.html" %}

{% block title %}
Login | NutriFit Healthy
{% endblock %}

{% block content %}

<section class="auth-section">

    <div class="auth-card">

        <h1>Welcome Back</h1>

        <p class="auth-subtitle">
            Log in and continue your health journey.
        </p>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit"
                    class="btn hero-primary-btn w-100">

                Login

            </button>

        </form>

        <div class="auth-link">

            Don't have an account?

            <a href="{% url 'account_signup' %}">
                Create one
            </a>

        </div>

    </div>

</section>

{% endblock %}
