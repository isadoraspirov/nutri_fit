{% load static %}
<!doctype html>

<html lang="en">
<head>

    {% block meta %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% endblock %}

    {% block extra_meta %}
    {% endblock %}

    <title>
        {% block title %}
            NutriFit Healthy
        {% endblock %}
    </title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
          rel="stylesheet">

    <!-- Favicons -->
    <link rel="icon"
          href="{% static 'images/favicon/favicon.ico' %}">

    <link rel="icon"
          type="image/png"
          sizes="32x32"
          href="{% static 'images/favicon/favicon-32x32.png' %}">

    <link rel="icon"
          type="image/png"
          sizes="16x16"
          href="{% static 'images/favicon/favicon-16x16.png' %}">

    <link rel="apple-touch-icon"
          sizes="180x180"
          href="{% static 'images/favicon/apple-touch-icon.png' %}">

    <link rel="icon"
          type="image/png"
          sizes="192x192"
          href="{% static 'images/favicon/android-chrome-192x192.png' %}">

    <link rel="icon"
          type="image/png"
          sizes="512x512"
          href="{% static 'images/favicon/android-chrome-512x512.png' %}">

    <!-- Bootstrap -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

    {% block extra_css %}
    {% endblock %}

</head>

<body class="d-flex flex-column min-vh-100">

      <!-- Navbar -->

<nav id="navbar"
     class="navbar navbar-expand-lg shadow-sm">

    <div class="container">

        <!-- Logo (left aligned) -->
        <a class="navbar-brand"
           href="{% url 'home' %}">

            <img src="{% static 'images/nutrifit_logo.jpg' %}"
                 alt="NutriFit"
                 height="60">

        </a>

        <!-- Hamburger -->
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
                aria-controls="navbarNav"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse justify-content-end"
             id="navbarNav">

            <ul class="navbar-nav align-items-center">

                <li class="nav-item">

                    <a class="nav-link active"
                       href="{% url 'home' %}">

                        Home

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/nutrition/">

                        Nutrition Plans

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/workouts/">

                        Workouts

                    </a>

                </li>

                <li class="nav-item ms-lg-3">

                    <a href="/accounts/login/"
                       class="btn btn-success">

                        Login

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

    
    {% block content %}
    {% endblock %}

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% load static %}
    
    <script src="{% static 'js/main.js' %}"></script>
    
    <script src="{% static 'js/script.js' %}"></script>

</body>
</html>
